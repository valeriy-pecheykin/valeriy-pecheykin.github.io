<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>VALERIY PECHEYKIN CAT</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#f8f5f0;
}

canvas{
    display:block;
}
</style>
</head>
<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    40,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.position.z = 60;

const renderer = new THREE.WebGLRenderer({
    antialias:true,
    alpha:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.setPixelRatio(
    Math.min(window.devicePixelRatio,2)
);

document.body.appendChild(renderer.domElement);

function createTextSprite(text){

    const canvas = document.createElement("canvas");

    canvas.width = 2048;
    canvas.height = 512;

    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#111";

    ctx.font="700 180px Arial";

    ctx.textAlign="center";
    ctx.textBaseline="middle";

    ctx.fillText(
        text,
        canvas.width/2,
        canvas.height/2
    );

    const texture =
        new THREE.CanvasTexture(canvas);

    texture.needsUpdate=true;

    const material =
        new THREE.SpriteMaterial({
            map:texture,
            transparent:true
        });

    const sprite =
        new THREE.Sprite(material);

    return sprite;
}

const body =
    createTextSprite("ПЕЧЕЙКИН");

body.scale.set(
    38,
    9,
    1
);

body.position.set(
    0,
    -2,
    0
);

body.material.rotation =
    THREE.MathUtils.degToRad(-8);

scene.add(body);

const head =
    createTextSprite("ВАЛЕРИЙ");

head.scale.set(
    18,
    6,
    1
);

head.position.set(
    17,
    9,
    0
);

head.material.rotation =
    THREE.MathUtils.degToRad(18);

scene.add(head);

const ear1 =
    createTextSprite("V");

ear1.scale.set(
    4,
    4,
    1
);

ear1.position.set(
    14,
    14,
    0
);

scene.add(ear1);

const ear2 =
    createTextSprite("Λ");

ear2.scale.set(
    4,
    4,
    1
);

ear2.position.set(
    20,
    14,
    0
);

scene.add(ear2);

const tail =
    createTextSprite("ПЕЧЕЙКИН");

tail.scale.set(
    20,
    5,
    1
);

tail.position.set(
    -20,
    -1,
    0
);

tail.material.rotation =
    THREE.MathUtils.degToRad(-55);

scene.add(tail);

const group =
    new THREE.Group();

group.add(body);
group.add(head);
group.add(ear1);
group.add(ear2);
group.add(tail);

scene.add(group);

let mouseX=0;
let mouseY=0;

window.addEventListener(
    "mousemove",
    e=>{

        mouseX=
            (e.clientX/window.innerWidth)*2-1;

        mouseY=
            (e.clientY/window.innerHeight)*2-1;

    }
);

function animate(time){

    requestAnimationFrame(animate);

    const t=time*0.001;

    group.rotation.y =
        Math.sin(t*0.25)*0.08
        + mouseX*0.15;

    group.rotation.x =
        Math.cos(t*0.18)*0.03
        - mouseY*0.05;

    const breath =
        1+
        Math.sin(t*0.7)*0.015;

    group.scale.set(
        breath,
        breath,
        breath
    );

    tail.material.rotation =
        THREE.MathUtils.degToRad(
            -55 +
            Math.sin(t*0.8)*6
        );

    renderer.render(
        scene,
        camera
    );
}

animate();

window.addEventListener(
    "resize",
    ()=>{

        camera.aspect=
            window.innerWidth/
            window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

    }
);

</script>
</body>
</html>
