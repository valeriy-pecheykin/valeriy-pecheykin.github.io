<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Валерий Печейкин</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #f8f5ef;
  color: #111;
  font-family: Arial, Helvetica, sans-serif;
}

canvas {
  position: fixed;
  inset: 0;
  z-index: 1;
}

.title {
  position: fixed;
  left: 52px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 2;
  font-size: clamp(42px, 6vw, 92px);
  line-height: 0.95;
  letter-spacing: 0.16em;
  font-weight: 400;
  pointer-events: none;
}

.subtitle {
  margin-top: 34px;
  font-size: 14px;
  letter-spacing: 0.28em;
  color: #555;
  text-transform: uppercase;
}

.menu {
  position: fixed;
  right: 68px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 2;
  display: grid;
  gap: 26px;
  font-size: 17px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.menu div {
  border-bottom: 1px solid #999;
  padding-bottom: 12px;
}

.hint {
  position: fixed;
  left: 52px;
  bottom: 36px;
  z-index: 2;
  font-size: 12px;
  letter-spacing: 0.25em;
  color: #777;
  text-transform: uppercase;
}

@media (max-width: 800px) {
  .title {
    left: 28px;
    top: 22%;
    font-size: 42px;
  }

  .menu {
    right: 28px;
    bottom: 32px;
    top: auto;
    transform: none;
    font-size: 14px;
    gap: 16px;
  }

  .hint {
    display: none;
  }
}
</style>
</head>

<body>

<div class="title">
  ВАЛЕРИЙ<br>
  ПЕЧЕЙКИН
  <div class="subtitle">писатель · драматург · лектор</div>
</div>

<div class="menu">
  <div>01 лекции</div>
  <div>02 тексты</div>
  <div>03 театр</div>
  <div>04 контакты</div>
</div>

<div class="hint">кот бегает по архиву</div>

<canvas id="catCanvas"></canvas>

<script>
const canvas = document.getElementById("catCanvas");
const ctx = canvas.getContext("2d");

let w, h, dpr;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  w = window.innerWidth;
  h = window.innerHeight;

  canvas.width = w * dpr;
  canvas.height = h * dpr;

  canvas.style.width = w + "px";
  canvas.style.height = h + "px";

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

resize();
window.addEventListener("resize", resize);

const cat = {
  x: 180,
  y: window.innerHeight * 0.72,
  vx: 2.4,
  baseY: window.innerHeight * 0.72,
  size: 1,
  direction: 1,
  phase: 0,
  mood: 0
};

let mouse = { x: -9999, y: -9999 };

window.addEventListener("mousemove", e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

function drawCat(x, y, s, dir, phase) {
  ctx.save();

  ctx.translate(x, y);
  ctx.scale(dir * s, s);

  ctx.fillStyle = "#111";
  ctx.strokeStyle = "#111";
  ctx.lineWidth = 4;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  // хвост
  ctx.save();
  ctx.translate(-64, -22);
  ctx.rotate(Math.sin(phase * 0.9) * 0.18);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-42, -38, -74, -16, -66, 18);
  ctx.bezierCurveTo(-60, 42, -22, 34, -34, 8);
  ctx.stroke();
  ctx.restore();

  // тело
  ctx.beginPath();
  ctx.ellipse(0, 0, 64, 34, -0.05, 0, Math.PI * 2);
  ctx.fill();

  // голова
  ctx.beginPath();
  ctx.ellipse(62, -28, 28, 24, 0.1, 0, Math.PI * 2);
  ctx.fill();

  // уши
  ctx.beginPath();
  ctx.moveTo(43, -45);
  ctx.lineTo(49, -76);
  ctx.lineTo(63, -48);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(67, -49);
  ctx.lineTo(83, -73);
  ctx.lineTo(82, -41);
  ctx.closePath();
  ctx.fill();

  // лапы
  const a = Math.sin(phase);
  const b = Math.sin(phase + Math.PI);

  drawLeg(-34, 24, a);
  drawLeg(-6, 25, b);
  drawLeg(28, 24, b);
  drawLeg(52, 19, a);

  // глаз
  ctx.fillStyle = "#f8f5ef";
  ctx.beginPath();
  ctx.arc(72, -33, 3.2, 0, Math.PI * 2);
  ctx.fill();

  // усики
  ctx.strokeStyle = "#111";
  ctx.lineWidth = 1.4;

  ctx.beginPath();
  ctx.moveTo(84, -28);
  ctx.lineTo(114, -36);
  ctx.moveTo(84, -24);
  ctx.lineTo(116, -24);
  ctx.moveTo(84, -20);
  ctx.lineTo(112, -12);
  ctx.stroke();

  ctx.restore();
}

function drawLeg(x, y, motion) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(motion * 0.35);

  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-4, 30);
  ctx.lineTo(14, 30);
  ctx.lineTo(10, 2);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawShadow(x, y, s) {
  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,0.08)";
  ctx.beginPath();
  ctx.ellipse(x, y + 39 * s, 78 * s, 9 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function animate() {
  requestAnimationFrame(animate);

  ctx.clearRect(0, 0, w, h);

  cat.phase += 0.16;
  cat.x += cat.vx * cat.direction;

  cat.baseY = h * 0.72;
  cat.y = cat.baseY + Math.sin(cat.phase * 0.8) * 2.5;

  const distanceToMouse = Math.hypot(mouse.x - cat.x, mouse.y - cat.y);

  if (distanceToMouse < 130) {
    cat.vx = 1.1;
    cat.mood += (1 - cat.mood) * 0.06;
  } else {
    cat.vx += (2.4 - cat.vx) * 0.03;
    cat.mood += (0 - cat.mood) * 0.04;
  }

  if (cat.x > w + 120) {
    cat.direction = -1;
  }

  if (cat.x < -120) {
    cat.direction = 1;
  }

  const scale = 1 + cat.mood * 0.08;

  drawShadow(cat.x, cat.y, scale);
  drawCat(cat.x, cat.y, scale, cat.direction, cat.phase);

  // маленькая “архивная” точка — чтобы сцена была чуть страннее
  ctx.save();
  ctx.fillStyle = "#111";
  ctx.beginPath();
  ctx.arc(w / 2, h - 42, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

animate();
</script>

</body>
</html>
